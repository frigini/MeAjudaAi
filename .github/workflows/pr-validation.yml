---
name: Pull Request Validation

"on":
  push:
    branches: [master, develop]
  pull_request:
    branches: ["**"]
  # Manual trigger for testing workflow changes
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

env:
  DOTNET_VERSION: "10.0.x"
  STRICT_COVERAGE: false # TODO: Re-set to true once coverage threshold (90%) is consistently met
  # PostgreSQL configuration (DRY principle - single source of truth)
  # Fallback credentials: Only used in fork/local dev; main repo requires secrets
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'test123' }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'postgres' }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'meajudaai_test' }}

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Prevent jobs from hanging indefinitely

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          # Using workflow-level environment variables (defined at top)
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_HOST_AUTH_METHOD: md5
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        ports:
          - 10000:10000
          - 10001:10001
          - 10002:10002

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Validate Secrets Configuration
        run: |
          echo "Using PostgreSQL credentials with fallback defaults"
          echo "POSTGRES_USER: ${{ env.POSTGRES_USER }}"
          echo "POSTGRES_DB: ${{ env.POSTGRES_DB }}"
          echo "POSTGRES_PASSWORD: [REDACTED]"

          echo "Database configuration validated"

      - name: Check Keycloak Configuration
        env:
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
        run: |
          echo "🔍 Checking Keycloak configuration..."
          if [ -z "$KEYCLOAK_ADMIN_PASSWORD" ]; then
            echo "ℹ️  KEYCLOAK_ADMIN_PASSWORD secret not configured - Keycloak is optional"
            echo "💡 To enable Keycloak authentication features, configure the secret in:"
            echo "   Settings → Secrets and variables → Actions → KEYCLOAK_ADMIN_PASSWORD"
            echo "🔄 Tests will continue without Keycloak-dependent features"
          else
            echo "✅ Keycloak secrets configured - authentication features enabled"
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: 🔧 Restore dependencies
        run: dotnet restore MeAjudaAi.slnx

      - name: Build solution
        run: dotnet build MeAjudaAi.slnx --configuration Release --no-restore

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./src/Web/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: ./src/Web
        run: npm ci

      - uses: nrwl/nx-set-shas@v5

      # Generate API client BEFORE lint/test so MeAjudaAi.Web.Customer has generated types
      - name: 🔧 Generate API Client
        working-directory: ./src/Web
        run: |
          set -e
          # 1. Install Swashbuckle CLI to extract OpenAPI spec from DLL
          dotnet tool install -g Swashbuckle.AspNetCore.Cli --version 10.1.5

          # 2. Extract OpenAPI spec (v1) to a temporary file
          # Note: Using Release build DLL from current workspace
          mkdir -p ../api

          # Provide dummy env vars to allow application DI container to build successfully
          # Note: ASPNETCORE_ENVIRONMENT must NOT be "Testing" here because Swashbuckle CLI
          # appends the env name to "Startup" (e.g. "StartupTesting") when resolving the host,
          # and no such class exists. Using "Development" avoids this quirk.
          # Migrations__Enabled=false skips ApplyModuleMigrationsAsync (no real DB in CI).
          export ASPNETCORE_ENVIRONMENT=Development
          export ConnectionStrings__DefaultConnection="Host=localhost;Database=dummy"
          export Migrations__Enabled=false

          # Use glob to find the DLL without hardcoding TFM (e.g. net10.0)
          # The path is relative to the current step context (root or working-directory)
          DLL_PATH=$(find ../../src/Bootstrapper/MeAjudaAi.ApiService/bin/Release -name "MeAjudaAi.ApiService.dll" | head -n 1)
          if [ -z "$DLL_PATH" ]; then
            echo "Error: MeAjudaAi.ApiService.dll not found!"
            exit 1
          fi
          echo "Found DLL at: $DLL_PATH"

          swagger tofile --output ../api/api-spec.json "$DLL_PATH" v1

          # 3. Generate API client for Customer Web App
          # The generator reads OPENAPI_SPEC_URL from env
          export OPENAPI_SPEC_URL="$GITHUB_WORKSPACE/src/api/api-spec.json"
          npm run generate:api --workspace=meajudaai.web.customer

      - name: 🔍 Lint Frontend Workspace
        working-directory: ./src/Web
        run: npx nx affected --target=lint

      - name: 🧪 Test Frontend Workspace
        working-directory: ./src/Web
        run: npx nx affected --target=test

      - name: 🏗️ Build Frontend Workspace
        working-directory: ./src/Web
        env:
          # Dummy values required so Next.js can collect page data during build.
          # auth.ts throws at module load time if these are missing, causing SSG to fail.
          KEYCLOAK_ADMIN_CLIENT_ID: ci-build-placeholder
          KEYCLOAK_ADMIN_CLIENT_SECRET: ci-build-placeholder
          KEYCLOAK_ISSUER: http://localhost:8080/realms/meajudaai
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-placeholder
          AUTH_SECRET: ci-build-placeholder
        run: |
          set -e
          # 1. Explicitly build the customer web app (uses generated API types)
          npx nx run MeAjudaAi.Web.Customer:build

          # 2. Run the affected build for the rest of the workspace
          npx nx affected --target=build --exclude=MeAjudaAi.Web.Customer

      - name: Prepare Aspire Integration Tests
        run: |
          echo "📦 Preparing .NET Aspire for integration tests..."
          echo "ℹ️  Note: Aspire workload is deprecated in .NET 10 - using NuGet packages instead"

          # In .NET 10, the Aspire orchestration package needs to be explicitly restored
          # The package name varies by platform RID
          echo "🔄 Downloading Aspire DCP orchestration package for linux-x64..."

          # Download the orchestration package directly
          # Note: The version should match the Aspire.AppHost.Sdk version (13.0.2)
          dotnet nuget locals all --list

          # Force download of the DCP package by adding it temporarily to a dummy project
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          dotnet new console -n TempDcpDownloader
          cd TempDcpDownloader

          # Add the Aspire orchestration package for Linux
          dotnet add package Aspire.Hosting.Orchestration.linux-x64 --version 13.0.2
          dotnet restore

          # Return to workspace
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"

          # Verify DCP binaries were downloaded (now located in NuGet package cache)
          echo "🔎 Verifying DCP binaries in NuGet cache..."

          # DCP binaries come from Aspire.Hosting.Orchestration.<RID> NuGet package
          # For linux-x64, the package is aspire.hosting.orchestration.linux-x64
          # NuGet packages are case-sensitive on Linux, so we need to search for the exact case
          DCP_PACKAGE_PATH=$(find "$HOME/.nuget/packages" -maxdepth 1 -type d \
            -iname "aspire.hosting.orchestration.linux-x64" 2>/dev/null | head -n 1)

          if [ -z "$DCP_PACKAGE_PATH" ]; then
            echo "❌ Error: aspire.hosting.orchestration.linux-x64 package not found in NuGet cache"
            echo "Searching for all Aspire orchestration packages..."
            find "$HOME/.nuget/packages" -maxdepth 1 -type d \
              -iname "*aspire*orchestration*" 2>/dev/null || echo "No Aspire orchestration packages found"
            echo "Listing all Aspire packages:"
            find "$HOME/.nuget/packages" -maxdepth 1 -type d \
              -iname "*aspire*" 2>/dev/null || echo "No Aspire packages found"
            echo "❌ Integration tests require Aspire DCP binaries - failing fast"
            exit 1
          fi

          echo "✅ Found Aspire package at: $DCP_PACKAGE_PATH"

          # Find DCP binary in the downloaded package
          DCP_BINARY=$(find "$DCP_PACKAGE_PATH" -type f -name "dcp" \
            2>/dev/null | head -n 1)

          if [ -z "$DCP_BINARY" ]; then
            echo "❌ Error: DCP binary not found in package"
            echo "Package structure:"
            ls -la "$DCP_PACKAGE_PATH" || true
            echo "❌ Integration tests require Aspire DCP binaries - failing fast"
            exit 1
          fi

          echo "✅ Aspire DCP binaries verified: $DCP_BINARY"

          # Set DOTNET_ROOT for SDK discovery
          # Note: This export to $GITHUB_ENV should persist to later steps, but the
          # "Generate Aggregated Coverage Report" step re-detects DOTNET_ROOT dynamically
          # as a fallback in case this export doesn't reliably persist across jobs.
          echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV

      - name: Check code formatting
        run: |
          set -o pipefail
          echo "🔍 Checking code formatting..."
          # Only check whitespace and style (not SonarQube analyzer warnings)
          dotnet format --verify-no-changes \
            --include whitespace style \
            --verbosity normal \
            MeAjudaAi.slnx \
            2>&1 | tee format-output.txt
          FORMAT_EXIT_CODE=${PIPESTATUS[0]}

          # Check if any files were actually formatted (not just warnings)
          if grep -q "Formatted code file" format-output.txt; then
            echo "⚠️ Code formatting issues found."
            echo "Run 'dotnet format --include whitespace style' locally to fix."
            grep "Formatted code file" format-output.txt
            exit 1
          elif [ $FORMAT_EXIT_CODE -ne 0 ]; then
            echo "⚠️ Formatting check failed with exit code $FORMAT_EXIT_CODE"
            exit $FORMAT_EXIT_CODE
          else
            echo "✅ No formatting changes needed"
          fi

      - name: Wait for PostgreSQL to be ready
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
        run: |
          echo "🔄 Waiting for PostgreSQL to be ready..."
          echo "Debug: POSTGRES_USER=$POSTGRES_USER"
          echo "Debug: Checking PostgreSQL availability..."

          counter=1
          max_attempts=60

          while [ $counter -le $max_attempts ]; do
            if pg_isready -h localhost -p 5432 -U "$POSTGRES_USER"; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($counter/$max_attempts)"
            sleep 3
            counter=$((counter + 1))
          done

          # Check if we exited the loop due to timeout
          if ! pg_isready -h localhost -p 5432 -U "$POSTGRES_USER"; then
            echo "❌ PostgreSQL failed to become ready within 180 seconds"
            echo "Debug: Checking PostgreSQL logs..."
            echo "Service container id: ${{ job.services.postgres.id }}"
            docker logs "${{ job.services.postgres.id }}" || echo "Could not get PostgreSQL logs"
            exit 1
          fi

      - name: Setup PostgreSQL connection
        id: db
        uses: ./.github/actions/setup-postgres-connection
        with:
          postgres-host: localhost
          postgres-port: 5432
          postgres-db: ${{ env.POSTGRES_DB }}
          postgres-user: ${{ env.POSTGRES_USER }}
          postgres-password: ${{ env.POSTGRES_PASSWORD }}

      - name: Run Unit Tests
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          # Pre-built connection string (optional, takes precedence if available)
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          # PostgreSQL connection for CI
          EXTERNAL_POSTGRES_HOST: localhost
          EXTERNAL_POSTGRES_PORT: 5432
          MEAJUDAAI_DB_HOST: localhost
          MEAJUDAAI_DB_PORT: 5432
          MEAJUDAAI_DB_PASS: ${{ env.POSTGRES_PASSWORD }}
          MEAJUDAAI_DB_USER: ${{ env.POSTGRES_USER }}
          MEAJUDAAI_DB: ${{ env.POSTGRES_DB }}
          # Legacy environment variables for compatibility
          DB_HOST: localhost
          DB_PORT: 5432
          DB_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          DB_USERNAME: ${{ env.POSTGRES_USER }}
          DB_NAME: ${{ env.POSTGRES_DB }}
          # Keycloak settings
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          # Azure Storage (Azurite emulator)
          # ⚠️ TEST CREDENTIALS ONLY - These are the standard Azurite local emulator credentials
          # These are intentionally public and documented at:
          # https://learn.microsoft.com/en-us/azure/storage/common/storage-use-azurite#well-known-storage-account-and-key
          AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;"
          AzureStorage__ConnectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;"
          # Map connection strings to .NET configuration using double underscore
          ConnectionStrings__DefaultConnection: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__Users: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__Search: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__meajudaai-db: ${{ steps.db.outputs.connection-string }}
        run: |
          set -euo pipefail
          echo "🧪 Executando testes com cobertura consolidada..."

          # Function to escape single quotes in PostgreSQL connection string values
          escape_single_quotes() {
            echo "$1" | sed "s/'/''/g"
          }

          # Build .NET connection string from PostgreSQL secrets with proper quoting
          # Check if a pre-built connection string secret exists first
          if [ -n "${DB_CONNECTION_STRING:-}" ]; then
            export ConnectionStrings__DefaultConnection="$DB_CONNECTION_STRING"
            echo "✅ Using pre-built connection string from DB_CONNECTION_STRING secret"
          else
            # Build connection string with proper Npgsql quoting for special characters
            ESCAPED_DB=$(escape_single_quotes "$MEAJUDAAI_DB")
            ESCAPED_USER=$(escape_single_quotes "$MEAJUDAAI_DB_USER")
            ESCAPED_PASS=$(escape_single_quotes "$MEAJUDAAI_DB_PASS")

            DB_CONN_STR="Host=localhost;Port=5432;Database='$ESCAPED_DB'"
            DB_CONN_STR="${DB_CONN_STR};Username='$ESCAPED_USER';Password='$ESCAPED_PASS'"
            export ConnectionStrings__DefaultConnection="$DB_CONN_STR"
            echo "✅ Built connection string from PostgreSQL secrets with proper quoting"
          fi

          # Test database connection first
          echo "Testing database connection..."
          PGPASSWORD="$MEAJUDAAI_DB_PASS" \
            psql -h localhost \
                 -U "$MEAJUDAAI_DB_USER" \
                 -d "$MEAJUDAAI_DB" \
                 -c "SELECT 1;" || {
            echo "❌ Database connection failed — aborting workflow"
            echo "💡 Ensure PostgreSQL service is running and secrets are configured:"
            echo "   - POSTGRES_PASSWORD, POSTGRES_USER, POSTGRES_DB"
            echo "🔄 Integration tests require database connectivity to validate changes"
            exit 1
          }

          # Remove any existing coverage data
          rm -rf ./coverage
          mkdir -p ./coverage

          echo "🧪 Running unit tests with coverage for all modules..."

          # Define modules for coverage testing
          # STRATEGY: Comprehensive coverage for Domain, Application, and critical Shared/ApiService layers
          # - Domain/Application: Core business logic (80-100% target)
          # - Shared/ApiService: Reusable infrastructure, middlewares, extensions (60-80% target)
          # - Excluded: Integration tests, E2E tests, Architecture tests (tested separately below)
          # - Frontend (bUnit): Separated into dedicated step below for better log analysis
          #
          # RATIONALE FOR INFRASTRUCTURE EXCLUSION:
          # Infrastructure tests are excluded from module-based coverage runs (--filter) because:
          # 1. Infrastructure tests often require real dependencies (databases, message brokers, etc.)
          # 2. Mixing unit tests (mocked) with infrastructure tests distorts coverage metrics
          # 3. Infrastructure/Integration tests run separately (lines 345-366) with proper test environment
          # 4. This separation ensures unit test coverage accurately reflects business logic coverage
          #
          # FORMAT: "ModuleName:path/to/module/tests/:IncludeFilter"
          MODULES=(
            # Domain module tests
            "Users:src/Modules/Users/Tests/:MeAjudaAi.Modules.Users.*"
            "Providers:src/Modules/Providers/Tests/:MeAjudaAi.Modules.Providers.*"
            "Documents:src/Modules/Documents/Tests/:MeAjudaAi.Modules.Documents.*"
            "ServiceCatalogs:src/Modules/ServiceCatalogs/Tests/:MeAjudaAi.Modules.ServiceCatalogs.*"
            "Locations:src/Modules/Locations/Tests/:MeAjudaAi.Modules.Locations.*"
            "SearchProviders:src/Modules/SearchProviders/Tests/:MeAjudaAi.Modules.SearchProviders.*"

            # System/Shared tests (626+ tests - HIGH PRIORITY)
            "Shared:tests/MeAjudaAi.Shared.Tests/:MeAjudaAi.Shared"
            "ApiService:tests/MeAjudaAi.ApiService.Tests/:MeAjudaAi.ApiService"
          )

          # Source shared utility functions once before module loop
          RUNSETTINGS_SCRIPT="./.github/scripts/generate-runsettings.sh"
          if [ ! -f "$RUNSETTINGS_SCRIPT" ] || [ ! -r "$RUNSETTINGS_SCRIPT" ]; then
            echo "❌ ERROR: Required script not found or not readable: $RUNSETTINGS_SCRIPT"
            exit 1
          fi
          if ! source "$RUNSETTINGS_SCRIPT"; then
            echo "❌ ERROR: Failed to source $RUNSETTINGS_SCRIPT (exit code: $?)"
            exit 1
          fi

          # Run unit tests for each module with coverage
          for module_info in "${MODULES[@]}"; do
            IFS=':' read -r module_name module_path include_pattern <<< "$module_info"

            if [ -d "$module_path" ]; then
              echo "================================"
              echo "🧪 UNIT TESTS - $module_name (WITH COVERAGE)"
              echo "================================"

              # Create specific output directory for this module
              MODULE_COVERAGE_DIR="./coverage/${module_name,,}"
              mkdir -p "$MODULE_COVERAGE_DIR"

            # CRITICAL: Include ALL assemblies matching the pattern to get full coverage
            # The Include filter determines which assemblies are instrumented for coverage
            # Using broad patterns ensures we capture all source code
            if [ -n "$include_pattern" ]; then
              INCLUDE_FILTER="[${include_pattern}]*"
            else
              # Default to all MeAjudaAi assemblies if no specific pattern
              INCLUDE_FILTER="[MeAjudaAi*]*"
            fi

            # Validate filter is not empty or trivial
            if [ "$INCLUDE_FILTER" = "[]*" ] || [ "$INCLUDE_FILTER" = "[].*" ]; then
              echo "⚠️  INCLUDE_FILTER is trivial, falling back to [MeAjudaAi*]*"
              INCLUDE_FILTER="[MeAjudaAi*]*"
            fi

            # NOTE: EXCLUDE_FILTER excludes test assemblies, migrations, and compiler-generated code
            # This ensures coverage metrics reflect only hand-written production code
            # Excluded patterns:
            #   - Test assemblies: [*.Tests*]*, [*Test*]*, [testhost]*
            #   - Migrations: [*]*Migrations* (any class/namespace containing "Migrations")
            #   - Database: [*]*.Database (database-related generated code)
            #   - Contracts: [*]*.Contracts (DTOs, no logic to test)
            #   - DbContextFactory: [*]*DbContextFactory* (EF Core design-time factories)
            #   - Program: [*]*.Program (application entry points)
            #   - OpenApi generated: [*Microsoft.AspNetCore.OpenApi.Generated*]*
            #   - Compiler services: [*System.Runtime.CompilerServices*]*
            #   - Regex generator: [*System.Text.RegularExpressions.Generated*]*
            EXCLUDE_FILTER="[*.Tests*]*,[*Test*]*,[testhost]*,[*]*Migrations*,[*]*.Database,[*]*.Contracts,[*]*DbContextFactory*,[*]*.Program,[*Microsoft.AspNetCore.OpenApi.Generated*]*,[*System.Runtime.CompilerServices*]*,[*System.Text.RegularExpressions.Generated*]*"
            EXCLUDE_BY_FILE="**/*OpenApi*.generated.cs,**/System.Runtime.CompilerServices*.cs,**/*RegexGenerator.g.cs,**/Migrations/*.cs,**/Migrations/**/*.cs,**/Database/*.cs,**/*DbContextFactory.cs,**/Program.cs"

            echo "  Include: $INCLUDE_FILTER"
            echo "  Exclude: $EXCLUDE_FILTER"
            echo "  ExcludeByFile: $EXCLUDE_BY_FILE"

            # Create temporary runsettings file for this module with proper XML escaping
            RUNSETTINGS_FILE="/tmp/${module_name,,}.runsettings"
            EXCLUDE_BY_ATTRIBUTE="Obsolete,GeneratedCode,CompilerGenerated"
            generate_runsettings \
              "$RUNSETTINGS_FILE" \
              "$EXCLUDE_FILTER" \
              "$EXCLUDE_BY_FILE" \
              "$EXCLUDE_BY_ATTRIBUTE" \
              "$INCLUDE_FILTER"


            # NOTE: We run ALL tests (no --filter) because:
            # 1. Tests should exercise all code paths
            # 2. Include/Exclude filters in .runsettings control COVERAGE (what code is instrumented)
            # 3. Test filters only control which TESTS run, not what CODE is covered
            dotnet test "$module_path" \
                --configuration Release \
                --verbosity normal \
                --collect:"XPlat Code Coverage" \
                --results-directory "$MODULE_COVERAGE_DIR" \
                --logger "trx;LogFileName=${module_name,,}-test-results.trx" \
                --settings "/tmp/${module_name,,}.runsettings"

              TEST_EXIT_CODE=$?
              if [ $TEST_EXIT_CODE -ne 0 ]; then
                echo "❌ Tests failed for $module_name with exit code $TEST_EXIT_CODE"
                exit $TEST_EXIT_CODE
              fi

              # Find and rename the coverage file to a predictable name
              if [ -d "$MODULE_COVERAGE_DIR" ]; then
                echo "🔍 Searching for coverage files in $MODULE_COVERAGE_DIR..."
                echo "📂 Directory contents:"
                find "$MODULE_COVERAGE_DIR" -type f -name "*.xml" | head -10

                # Look for cobertura format (search recursively in GUID subdirs)
                COVERAGE_FILE=$(find "$MODULE_COVERAGE_DIR" -type f \
                  -name "coverage.cobertura.xml" \
                  -print -quit)
                if [ -f "$COVERAGE_FILE" ]; then
                  echo "✅ Found coverage file: $COVERAGE_FILE"
                  # Move to standardized name (removes the GUID-based original to avoid double-counting)
                  mv "$COVERAGE_FILE" "$MODULE_COVERAGE_DIR/${module_name,,}.cobertura.xml"
                else
                  echo "⚠️  Coverage file not found for $module_name"
                  echo "📋 Available XML files:"
                  find "$MODULE_COVERAGE_DIR" -name "*.xml" -type f | head -5
                fi
              else
                echo "❌ Coverage directory not found: $MODULE_COVERAGE_DIR"
              fi
            else
              echo "⚠️  $module_name tests not found at $module_path - skipping"
            fi
          done

          echo ""
          echo "📊 COVERAGE FILES SUMMARY"
          echo "========================="
          echo "Total coverage XML files generated:"
          find ./coverage -type f -name "*.cobertura.xml" | wc -l
          echo ""
          echo "Coverage files by module:"
          find ./coverage -type f -name "*.cobertura.xml" -printf "%f\n" | sort | head -20
          echo ""

          echo "🔍 DEBUG: Verifying coverage files for CodeCoverageSummary..."
          for module in users providers documents servicecatalogs locations searchproviders shared apiservice; do
            if [ -f "coverage/${module}/${module}.cobertura.xml" ]; then
              echo "  ✅ coverage/${module}/${module}.cobertura.xml exists"
              # Show file size and first line-rate value as sanity check
              FILE_SIZE=$(stat -c%s "coverage/${module}/${module}.cobertura.xml" 2>/dev/null || echo "unknown")
              COVERAGE=$(grep -o 'line-rate="[^"]*"' "coverage/${module}/${module}.cobertura.xml" 2>/dev/null | head -1 | cut -d'"' -f2 || echo "N/A")
              echo "     Size: ${FILE_SIZE} bytes, Coverage Rate: ${COVERAGE}"
            else
              echo "  ❌ coverage/${module}/${module}.cobertura.xml NOT FOUND"
            fi
          done
          echo ""

      - name: Run Architecture Tests
        if: always()
        run: |
          echo "🧪 Running Architecture tests (no database required)..."

          # Only run Architecture tests in PR validation (fast, no database dependency)
          if [ -d "tests/MeAjudaAi.Architecture.Tests/" ]; then
            echo "================================"
            echo "📐 ARCHITECTURE TESTS"
            echo "================================"
            dotnet test "tests/MeAjudaAi.Architecture.Tests/" \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=architecture-test-results.trx"
            
            TEST_EXIT_CODE=$?
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo "❌ Architecture tests failed with exit code $TEST_EXIT_CODE"
              exit $TEST_EXIT_CODE
            fi
          else
            echo "⚠️  Architecture tests not found - skipping"
          fi

      - name: Run Frontend Component Tests (bUnit)
        if: always()
        env:
          ASPNETCORE_ENVIRONMENT: Testing
        run: |
          echo "===================================="
          echo "🎨 FRONTEND COMPONENT TESTS (bUnit)"
          echo "===================================="
          echo ""
          echo "Running Blazor WASM component tests with bUnit framework"
          echo "Target: MeAjudaAi.Web.Admin (Blazor Admin Portal)"
          echo ""
          echo "⚠️  Note: Coverage NOT collected for Blazor WASM (unreliable due to generated code)"
          echo "Focus: Maximum test coverage of components, not code coverage metrics"
          echo ""

          echo "▶️ Running Web.Admin component tests (Providers, Dashboard, DarkMode)..."
          dotnet test tests/MeAjudaAi.Web.Admin.Tests/MeAjudaAi.Web.Admin.Tests.csproj \
            --configuration Release \
            --no-restore \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=webadmin-test-results.trx"

          FRONTEND_EXIT_CODE=$?
          if [ $FRONTEND_EXIT_CODE -ne 0 ]; then
            echo "❌ Frontend component tests failed with exit code $FRONTEND_EXIT_CODE"
            exit $FRONTEND_EXIT_CODE
          fi

          echo ""
          echo "✅ Frontend component tests completed successfully"
          echo "===================================="

      - name: Free Disk Space for Integration Tests
        run: |
          echo "🧹 Freeing disk space before integration tests..."

          # Show disk usage before cleanup
          echo "📊 Disk usage before cleanup:"
          df -h

          # Remove Docker images and containers that are not needed
          echo "🗑️  Removing unused Docker resources..."
          docker system prune -af --volumes || true

          # Remove large packages/tools not needed for tests
          echo "🗑️  Removing unnecessary packages..."
          sudo apt-get clean
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true

          # Show disk usage after cleanup
          echo "📊 Disk usage after cleanup:"
          df -h

          echo "✅ Disk space cleanup completed"

      - name: Run Integration Tests
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          INTEGRATION_TESTS: true
          MEAJUDAAI_DB_PASS: ${{ env.POSTGRES_PASSWORD }}
          MEAJUDAAI_DB_USER: ${{ env.POSTGRES_USER }}
          MEAJUDAAI_DB: ${{ env.POSTGRES_DB }}
          ConnectionStrings__DefaultConnection: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__Users: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__Search: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__meajudaai-db: ${{ steps.db.outputs.connection-string }}
        run: |
          echo "🔗 Running Integration tests..."

          # Source shared utility functions with existence check
          RUNSETTINGS_SCRIPT="./.github/scripts/generate-runsettings.sh"
          if [ ! -f "$RUNSETTINGS_SCRIPT" ] || [ ! -r "$RUNSETTINGS_SCRIPT" ]; then
            echo "❌ ERROR: Required script not found or not readable: $RUNSETTINGS_SCRIPT"
            exit 1
          fi
          if ! source "$RUNSETTINGS_SCRIPT"; then
            echo "❌ ERROR: Failed to source $RUNSETTINGS_SCRIPT (exit code: $?)"
            exit 1
          fi

          if [ -d "tests/MeAjudaAi.Integration.Tests/" ]; then
            echo "================================"
            echo "🔗 INTEGRATION TESTS"
            echo "================================"
            
            # Create runsettings with same exclusions as unit tests
            INTEGRATION_RUNSETTINGS="/tmp/integration.runsettings"
            # Exclude compiler-generated files AND test assembly files from coverage
            EXCLUDE_BY_FILE="**/*OpenApi*.generated.cs,**/System.Runtime.CompilerServices*.cs,**/*RegexGenerator.g.cs"
            EXCLUDE_BY_ATTRIBUTE="Obsolete,GeneratedCode,CompilerGenerated"
            EXCLUDE_FILTER="[*.Tests]*,[*.Tests.*]*,[*Test*]*,[testhost]*"
            INCLUDE_FILTER="[MeAjudaAi*]*"  # Instrument all MeAjudaAi assemblies
            
            generate_runsettings \
              "$INTEGRATION_RUNSETTINGS" \
              "$EXCLUDE_FILTER" \
              "$EXCLUDE_BY_FILE" \
              "$EXCLUDE_BY_ATTRIBUTE" \
              "$INCLUDE_FILTER"
            
            dotnet test "tests/MeAjudaAi.Integration.Tests/" \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=integration-test-results.trx" \
              --collect:"XPlat Code Coverage" \
              --results-directory ./coverage/integration \
              --settings "$INTEGRATION_RUNSETTINGS"
            
            TEST_EXIT_CODE=$?
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo "❌ Integration tests failed with exit code $TEST_EXIT_CODE"
              exit $TEST_EXIT_CODE
            fi
          else
            echo "⚠️  Integration tests not found - skipping"
          fi

      - name: Run E2E Tests
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          INTEGRATION_TESTS: true
          MEAJUDAAI_DB_PASS: ${{ env.POSTGRES_PASSWORD }}
          MEAJUDAAI_DB_USER: ${{ env.POSTGRES_USER }}
          MEAJUDAAI_DB: ${{ env.POSTGRES_DB }}
          ConnectionStrings__DefaultConnection: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__Users: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__Search: ${{ steps.db.outputs.connection-string }}
          ConnectionStrings__meajudaai-db: ${{ steps.db.outputs.connection-string }}
        run: |
          echo "🌐 Running E2E tests..."

          # Source shared utility functions with existence check
          RUNSETTINGS_SCRIPT="./.github/scripts/generate-runsettings.sh"
          if [ ! -f "$RUNSETTINGS_SCRIPT" ] || [ ! -r "$RUNSETTINGS_SCRIPT" ]; then
            echo "❌ ERROR: Required script not found or not readable: $RUNSETTINGS_SCRIPT"
            exit 1
          fi
          if ! source "$RUNSETTINGS_SCRIPT"; then
            echo "❌ ERROR: Failed to source $RUNSETTINGS_SCRIPT (exit code: $?)"
            exit 1
          fi

          if [ -d "tests/MeAjudaAi.E2E.Tests/" ]; then
            echo "================================"
            echo "🌐 E2E TESTS"
            echo "================================"
            
            # Create runsettings with same exclusions as unit tests
            E2E_RUNSETTINGS="/tmp/e2e.runsettings"
            # Exclude compiler-generated files AND test assembly files from coverage
            EXCLUDE_BY_FILE="**/*OpenApi*.generated.cs,**/System.Runtime.CompilerServices*.cs,**/*RegexGenerator.g.cs"
            EXCLUDE_BY_ATTRIBUTE="Obsolete,GeneratedCode,CompilerGenerated"
            EXCLUDE_FILTER="[*.Tests]*,[*.Tests.*]*,[*Test*]*,[testhost]*"
            INCLUDE_FILTER="[MeAjudaAi*]*"  # Instrument all MeAjudaAi assemblies
            
            generate_runsettings \
              "$E2E_RUNSETTINGS" \
              "$EXCLUDE_FILTER" \
              "$EXCLUDE_BY_FILE" \
              "$EXCLUDE_BY_ATTRIBUTE" \
              "$INCLUDE_FILTER"
            
            dotnet test "tests/MeAjudaAi.E2E.Tests/" \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --logger "trx;LogFileName=e2e-test-results.trx" \
              --collect:"XPlat Code Coverage" \
              --results-directory ./coverage/e2e \
              --settings "$E2E_RUNSETTINGS"
            
            TEST_EXIT_CODE=$?
            if [ $TEST_EXIT_CODE -ne 0 ]; then
              echo "❌ E2E tests failed with exit code $TEST_EXIT_CODE"
              exit $TEST_EXIT_CODE
            fi
          else
            echo "⚠️  E2E tests not found - skipping"
          fi

          echo ""
          echo "✅ All test categories completed"

      - name: Generate Aggregated Coverage Report
        if: always()
        run: |
          echo "📊 Generating aggregated coverage report from ALL tests..."

          # Verify .NET 10 installation
          echo "🔍 Verifying .NET installation..."
          dotnet --version
          dotnet --list-sdks
          dotnet --list-runtimes

          # Pre-flight check: verify all expected coverage files exist
          echo "🔍 Pre-flight check: Verifying coverage files..."
          MISSING_FILES=0
          for module in users providers documents servicecatalogs locations searchproviders shared apiservice; do
            if ! find "coverage/${module}" -name "*.cobertura.xml" -type f | grep -q .; then
              echo "  ⚠️  Warning: No .cobertura.xml files found for ${module}"
              MISSING_FILES=$((MISSING_FILES + 1))
            else
              echo "  ✅ Found coverage file(s) for ${module}"
            fi
          done

          # Check for Integration/E2E coverage
          if find "coverage/integration" -name "*.xml" -type f | grep -q .; then
            echo "  ✅ Found Integration test coverage"
          fi
          if find "coverage/e2e" -name "*.xml" -type f | grep -q .; then
            echo "  ✅ Found E2E test coverage"
          fi

          if [ $MISSING_FILES -gt 0 ]; then
            echo "⚠️  Warning: $MISSING_FILES module(s) missing coverage files"
            echo "   ReportGenerator will combine only available modules"
          fi

      - name: Configure DOTNET_ROOT for ReportGenerator
        run: |
          # ReportGenerator needs DOTNET_ROOT to find .NET runtime
          # Set to system installation path where .NET 10 runtime is installed
          if command -v dotnet >/dev/null 2>&1; then
            DOTNET_PATH=$(which dotnet)
            DOTNET_RESOLVED=$(readlink -f "$DOTNET_PATH")
            export DOTNET_ROOT=$(dirname "$DOTNET_RESOLVED")
            echo "DOTNET_ROOT=$DOTNET_ROOT" >> $GITHUB_ENV
            echo "✅ Set DOTNET_ROOT: $DOTNET_ROOT"
            
            # Validate DOTNET_ROOT directory
            if [ ! -d "$DOTNET_ROOT" ]; then
              echo "❌ ERROR: DOTNET_ROOT directory does not exist: $DOTNET_ROOT"
              exit 1
            fi
            
            echo "📋 Available runtimes:"
            dotnet --list-runtimes
          else
            echo "❌ dotnet command not found"
            exit 1
          fi

      - name: Generate aggregated coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        env:
          DOTNET_ROOT: ${{ env.DOTNET_ROOT }}
        with:
          reports: "coverage/**/*.cobertura.xml"
          targetdir: "coverage/aggregate"
          reporttypes: "Cobertura;JsonSummary"
          assemblyfilters: "+MeAjudaAi.Modules.Users.*;+MeAjudaAi.Modules.Providers.*;+MeAjudaAi.Modules.Documents.*;+MeAjudaAi.Modules.ServiceCatalogs.*;+MeAjudaAi.Modules.Locations.*;+MeAjudaAi.Modules.SearchProviders.*;+MeAjudaAi.Shared*;+MeAjudaAi.ApiService*"
          classfilters: "-*.Tests;-*.Tests.*;-*Test*;-testhost;-xunit*;-*.Migrations.*;-*.Contracts;-*.Database;-*DbContextFactory;-*.Program;-*.Keycloak.*;-*.Monitoring.*;-*NoOp*;-*RabbitMq*;-*ServiceBus*;-*Hangfire*;-*.Jobs.*;-*Options;-*BaseDesignTimeDbContextFactory*;-*SchemaPermissionsManager;-*SimpleHostEnvironment;-*CacheWarmupService;-*GeoPointConverter;-*ModuleNames;-*ModuleApiInfo;-*MessagingExtensions;-*ICacheableQuery"
          filefilters: "-*Migrations*"
          verbosity: "Info"
          tag: "${{ github.run_number }}_${{ github.run_id }}"
        # Note: Backend coverage only. Frontend bUnit tests run separately without coverage (unreliable for Blazor WASM).

      - name: Display coverage summary
        run: |
          if [ -f "coverage/aggregate/Cobertura.xml" ]; then
            echo "✅ Aggregated coverage report generated: coverage/aggregate/Cobertura.xml"
            # Show summary stats from Cobertura XML
            COVERAGE=$(grep -o 'line-rate="[^"]*"' coverage/aggregate/Cobertura.xml | head -1 | cut -d'"' -f2 | awk '{printf "%.2f", $1 * 100}' || echo "N/A")
            echo "📈 Combined Line Coverage (Unit + Integration + E2E): ${COVERAGE}%"
          else
            echo "❌ Failed to generate aggregated coverage report"
          fi

      - name: Validate namespace reorganization
        run: |
          echo "🔍 Validating namespace reorganization..."
          if grep -R -nE '^[[:space:]]*using[[:space:]]+MeAjudaAi\.Shared\.Common;' -- src/ \
              2>/dev/null; then
            echo "❌ Found old namespace imports"
            exit 1
          else
            echo "✅ Conformidade com namespaces validada"
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: coverage/**
          retention-days: 7
          compression-level: 6
          if-no-files-found: ignore

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7
          compression-level: 6
          if-no-files-found: ignore

      - name: List Coverage Files (Debug)
        run: |
          echo "🔍 Listing coverage files for debugging..."
          echo "Coverage directory structure:"
          find ./coverage -type f 2>/dev/null | head -20 || echo "No files found in coverage directory"
          echo ""
          echo "OpenCover XML files (Backward Compatibility):"
          find ./coverage -name "*.opencover.xml" -type f 2>/dev/null || echo "No .opencover.xml files found"
          echo ""
          echo "Cobertura XML files:"
          find ./coverage -name "*.cobertura.xml" -type f 2>/dev/null || echo "No .cobertura.xml files found"
          echo ""
          echo "Any XML files:"
          find ./coverage -name "*.xml" -type f 2>/dev/null || echo "No XML files found"
          echo ""
          echo "Coverage directory contents:"
          ls -la ./coverage/ 2>/dev/null || echo "Coverage directory not found"
          echo ""
          echo "Checking for coverage.xml files:"
          find ./coverage -name "coverage.xml" -type f 2>/dev/null || echo "No coverage.xml files found"

      - name: Fix Coverage Files (if needed)
        run: |
          echo "🔧 Attempting to fix coverage file locations and names..."

          # Find any coverage.xml files and rename them to appropriate format
          find ./coverage -name "coverage.xml" -type f | while read -r file; do
            dir=$(dirname "$file")
            module=$(basename "$dir")
            new_file="$dir/$module.cobertura.xml"
            echo "Copying $file to $new_file"
            cp "$file" "$new_file"
          done

          # Find coverage files in nested directories and copy to module directories
          find ./coverage -type f \
            \( -name "coverage.opencover.xml" -o -name "coverage.cobertura.xml" \) \
            | while read -r file; do
            # Get the module directory (should be like ./coverage/users/)
            module_dir=$(echo "$file" | sed 's|coverage/\([^/]*\)/.*|coverage/\1|')
            module_name=$(basename "$module_dir")

            # Determine target file based on source format
            if [[ "$file" == *"cobertura"* ]]; then
              target_file="$module_dir/$module_name.cobertura.xml"
            else
              target_file="$module_dir/$module_name.opencover.xml"
            fi

            if [ "$file" != "$target_file" ]; then
              echo "Copying $file to $target_file"
              cp "$file" "$target_file" 2>/dev/null || true
            fi
          done

          echo "Coverage files after processing:"
          find ./coverage -name "*.xml" -type f 2>/dev/null || echo "No XML coverage files found"

      - name: Code Coverage Summary
        id: coverage_cobertura_aggregate
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "coverage/aggregate/Cobertura.xml"
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "80 90"

      - name: Alternative Coverage Summary (Cobertura format)
        id: coverage_cobertura
        if: ${{ always() && steps.coverage_cobertura_aggregate.outcome != 'success' }}
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "coverage/users/*.cobertura.xml,coverage/providers/*.cobertura.xml,coverage/documents/*.cobertura.xml,coverage/servicecatalogs/*.cobertura.xml,coverage/locations/*.cobertura.xml,coverage/searchproviders/*.cobertura.xml,coverage/shared/*.cobertura.xml,coverage/apiservice/*.cobertura.xml"
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "80 90"
        continue-on-error: true

      - name: Fallback Coverage Summary (any XML)
        id: coverage_fallback
        if: >-
          ${{ always() &&
              steps.coverage_cobertura_aggregate.outcome != 'success' &&
              steps.coverage_cobertura.outcome != 'success' }}
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "coverage/**/*.xml"
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "80 90"
        continue-on-error: true

      - name: Display Coverage Percentages
        if: always()
        run: |
          echo "📊 CODE COVERAGE SUMMARY"
          echo "========================"
          echo ""

          # Analyze coverage from the 8 backend modules + shared
          MODULES=("users" "providers" "documents" "servicecatalogs" "locations" "searchproviders" "shared" "apiservice")

          for module in "${MODULES[@]}"; do
            coverage_file="./coverage/${module}/${module}.cobertura.xml"
            if [ -f "$coverage_file" ]; then
              echo "📄 Module: ${module^}"
              # Extract coverage statistics from Cobertura XML
              if command -v awk >/dev/null 2>&1; then
                # Cobertura uses line-rate="0.85" format
                line_rate=$(grep -o 'line-rate="[^"]*"' "$coverage_file" | head -1 | cut -d'"' -f2 || echo "N/A")
                branch_rate=$(grep -o 'branch-rate="[^"]*"' "$coverage_file" | head -1 | cut -d'"' -f2 || echo "N/A")
                
                if [ "$line_rate" != "N/A" ]; then
                  lines_covered=$(echo "$line_rate" | awk '{printf "%.2f", $1 * 100}')
                  echo "  📈 Line Coverage: ${lines_covered}%"
                fi
                if [ "$branch_rate" != "N/A" ]; then
                  branch_covered=$(echo "$branch_rate" | awk '{printf "%.2f", $1 * 100}')
                  echo "  🌿 Branch Coverage: ${branch_covered}%"
                fi
              fi
              echo ""
            fi
          done

          echo "💡 For detailed coverage report, check the 'Code Coverage Summary' step above"
          echo "🎯 Minimum thresholds: 80% (warning) / 90% (good)"

      - name: Select Coverage Outputs
        id: select_coverage_outputs
        if: always()
        run: |
          echo "🔍 Detecting coverage files..."

          if [ -f "coverage/aggregate/Cobertura.xml" ]; then
            COVERAGE_FILE="coverage/aggregate/Cobertura.xml"
            SOURCE="Cobertura (Aggregated Direct)"
            echo "✅ Found aggregated Cobertura file: $COVERAGE_FILE"
          elif find coverage -name "*.opencover.xml" -type f | head -1 >/dev/null 2>&1; then
            COVERAGE_FILE=$(find coverage -name "*.opencover.xml" -type f | head -1)
            SOURCE="OpenCover (Direct)"
            echo "Found OpenCover file: $COVERAGE_FILE"
          elif find coverage -name "*.cobertura.xml" -type f | head -1 >/dev/null 2>&1; then
            COVERAGE_FILE=$(find coverage -name "*.cobertura.xml" -type f | head -1)
            SOURCE="Cobertura (Direct)"
            echo "Found Cobertura file: $COVERAGE_FILE"
          elif find coverage -name "*.xml" -type f | head -1 >/dev/null 2>&1; then
            COVERAGE_FILE=$(find coverage -name "*.xml" -type f | head -1)
            SOURCE="XML (Direct)"
            echo "Found XML file: $COVERAGE_FILE"
          else
            COVERAGE_FILE=""
            SOURCE="None"
            echo "No coverage files found"
          fi

          if [ -n "$COVERAGE_FILE" ]; then
            # Try to extract basic coverage percentage from XML
            if command -v grep >/dev/null 2>&1; then
              # Look for line-rate or sequenceCoverage attributes
              LINE_RATE=$(grep -o 'line-rate="[^"]*"' "$COVERAGE_FILE" 2>/dev/null | head -1 | cut -d'"' -f2)
              if [ -z "$LINE_RATE" ]; then
                LINE_RATE=$(grep -o 'sequenceCoverage="[^"]*"' "$COVERAGE_FILE" 2>/dev/null | head -1 | cut -d'"' -f2)
              fi

              if [ -n "$LINE_RATE" ]; then
                # Convert decimal to percentage if needed (auto-detect format)
                # If value <= 1.0, assume decimal (0.75 -> 75.00), else assume already percentage (75.5 -> 75.50)
                PERCENTAGE=$(echo "$LINE_RATE" | awk '{if ($1 <= 1.0) printf "%.2f", $1 * 100; else printf "%.2f", $1}')
                SUMMARY="**Coverage**: ${PERCENTAGE}% (extracted from $SOURCE)"
                BADGE="![Coverage](https://img.shields.io/badge/coverage-${PERCENTAGE}%25-brightgreen)"
              else
                SUMMARY="**Coverage**: Available (file found, percentage not extracted)"
                BADGE="![Coverage](https://img.shields.io/badge/coverage-available-blue)"
              fi
            else
              SUMMARY="**Coverage**: Files found but could not extract percentage"
              BADGE="![Coverage](https://img.shields.io/badge/coverage-found-blue)"
            fi
          else
            SUMMARY="Coverage data not available"
            BADGE=""
          fi

          # Export outputs
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "badge=$BADGE" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT

          # Export multiline summary using heredoc
          {
            echo 'summary<<EOF'
            echo "$SUMMARY"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

          echo "Coverage source: $SOURCE"
          echo "Summary: $SUMMARY"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          header: coverage-report
          message: |
            ## 📊 Code Coverage Report

            ${{ steps.select_coverage_outputs.outputs.summary }}

            ### 📈 Coverage Details
            - **Coverage badges**: ${{ steps.select_coverage_outputs.outputs.badge }}
            - **Minimum threshold**: 80% (warning) / 90% (good)
            - **Report format**: Auto-detected from OpenCover/Cobertura XML files
            - **Coverage source**: ${{ steps.select_coverage_outputs.outputs.source }}

            ### 📋 Coverage Analysis
            - **Line Coverage**: Shows percentage of code lines executed during tests
            - **Branch Coverage**: Shows percentage of code branches/conditions tested
            - **Complexity**: Code complexity metrics for maintainability

            ### 🎯 Quality Gates
            - ✅ **Pass**: Coverage ≥ 90%
            - ⚠️ **Warning**: Coverage 80-89%
            - ❌ **Fail**: Coverage < 80%

            ### 📁 Artifacts
            - **Coverage reports**: Available in workflow artifacts
            - **Test results**: TRX files with detailed test execution data

            *This comment is updated automatically on each push to track coverage trends.*

      # Refactored: Extracted to reusable action for better maintainability
      # See: .github/actions/validate-coverage/README.md for documentation
      - name: Validate Coverage Thresholds
        if: always()
        uses: ./.github/actions/validate-coverage
        with:
          coverage-directory: "./coverage"
          threshold: "90"
          strict-mode: ${{ env.STRICT_COVERAGE }}
          opencover-outcome: ""
          cobertura-outcome: ${{ steps.coverage_cobertura.outcome }}
          fallback-outcome: ${{ steps.coverage_fallback.outcome }}

  # Job 2: Security Scan (Consolidated)
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Security scans shouldn't take more than 30 minutes

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MeAjudaAi.slnx

      - name: Run Security Audit
        run: dotnet list package --vulnerable --include-transitive

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: OSV-Scanner (fail on HIGH/CRITICAL)
        run: |
          echo "🔍 Installing OSV-Scanner..."
          # Install OSV-Scanner with pinned version for reproducibility
          OSV_VERSION="v1.8.3"
          OSV_URL="https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}"

          # Retry logic for network transient failures
          max_retries=3
          retry_count=0

          while [ $retry_count -lt $max_retries ]; do
            if curl -sSfL --connect-timeout 10 --max-time 30 \
                "${OSV_URL}/osv-scanner_linux_amd64" -o osv-scanner; then
              echo "✅ Download successful"
              chmod +x osv-scanner
              break
            else
              retry_count=$((retry_count + 1))
              if [ $retry_count -lt $max_retries ]; then
                echo "⚠️  Download failed (attempt $retry_count/$max_retries), retrying in 5s..."
                sleep 5
              else
                echo "❌ Download failed after $max_retries attempts"
                echo "💡 Trying fallback: install via Go toolchain..."

                # Fallback: Install via Go if available
                if command -v go >/dev/null 2>&1; then
                  echo "ℹ️  Using Go to install OSV-Scanner..."
                  go install github.com/google/osv-scanner/cmd/osv-scanner@${OSV_VERSION}
                  # Copy to local dir for consistent usage
                  cp "$(go env GOPATH)/bin/osv-scanner" ./osv-scanner 2>/dev/null || \
                    ln -s "$(go env GOPATH)/bin/osv-scanner" ./osv-scanner
                else
                  echo "❌ Go toolchain not available, cannot install OSV-Scanner"
                  echo "⚠️  CRITICAL: Vulnerability scan cannot be performed"
                  echo "💡 MITIGATION: Ensure runner has Go ≥1.18 installed or provide pre-built OSV-Scanner binary"
                  echo "💡 SECURITY NOTE: This workflow MUST fail when vulnerability scanning is unavailable."
                  echo "   To fix: ensure Go is installed on the runner or configure a pre-built OSV-Scanner binary."
                  exit 1  # Fail the workflow - security scanning is mandatory
                fi
              fi
            fi
          done

          echo "OSV-Scanner version and help:"
          ./osv-scanner --version || echo "Version command failed"
          ./osv-scanner scan --help | head -20 || echo "Help command failed"

          echo "🔍 Running vulnerability scan..."
          # Run OSV-Scanner and capture exit code
          osv_exit_code=0
          ./osv-scanner scan --recursive --skip-git . || osv_exit_code=$?

          if [ $osv_exit_code -eq 0 ]; then
            echo "✅ No vulnerabilities found"
          else
            echo "⚠️ OSV-Scanner found vulnerabilities (exit code: $osv_exit_code)"
            echo "📄 Running detailed scan for analysis..."

            # Run again with JSON output for detailed analysis
            ./osv-scanner scan --recursive --skip-git --format json . > osv-results.json || true

            if [ -f osv-results.json ]; then
              # Count HIGH/CRITICAL by CVSS (>=7.0) with safe parsing and textual severity mapping
              HIGH_OR_CRIT=$(
                jq -r '
                  # Function to safely convert severity scores to numbers
                  def safe_score_to_number:
                    if type == "number" then .
                    elif type == "string" then
                      (tonumber? // (
                        (. | ascii_upcase) as $upper
                        | if $upper == "CRITICAL" then 9
                          elif $upper == "HIGH" then 7
                          elif $upper == "MEDIUM" then 5
                          elif $upper == "LOW" then 3
                          else 0
                          end
                      ))
                    else 0
                    end;

                  [.results[]?.packages[]?.vulnerabilities[]?
                    | ( [(.severity // [])[]?.score? | safe_score_to_number] | max // 0 )
                    | select(. >= 7.0)
                  ] | length
                ' osv-results.json 2>/dev/null
              )

              if [ "${HIGH_OR_CRIT:-0}" -gt 0 ]; then
                echo "❌ Found $HIGH_OR_CRIT HIGH/CRITICAL vulnerabilities"
                echo "📋 First 10 vulnerabilities found:"
                # Use inline jq program to display vulnerability summary
                jq -r '.results[]?.packages[]?.vulnerabilities[]? |
                  "- \(.id): \(.summary // "No summary")"' \
                  osv-results.json 2>/dev/null | head -10
                echo ""
                echo "🚫 Security scan failed - vulnerabilities detected"
                echo "💡 Please review and fix vulnerabilities before merging"

                # Fail the workflow
                exit 1
              else
                echo "✅ No HIGH/CRITICAL vulnerabilities found"
                # Count total vulnerabilities for info
                TOTAL_VULNS=$(jq -r '.results[]?.packages[]?.vulnerabilities[]? | .id' \
                  osv-results.json 2>/dev/null | wc -l)
                if [ "$TOTAL_VULNS" -gt 0 ]; then
                  echo "ℹ️  Found $TOTAL_VULNS low/medium severity vulnerabilities (ignored)"
                fi
              fi
            else
              echo "❌ OSV-Scanner failed but no results file generated"
              exit 1
            fi
          fi

      - name: Secret Detection with TruffleHog
        if: ${{ github.event_name == 'pull_request' }}
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.ref }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified
  # Job 3: Markdown Link Validation (Simplified)
  markdown-link-check:
    name: Validate Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Link validation should be quick

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache lychee results
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('**/*.md','config/lychee.toml') }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Check markdown links with lychee
        uses: lycheeverse/lychee-action@v2.7.0
        with:
          # Use simplified configuration for reliability
          args: >-
            --config config/lychee.toml
            --no-progress
            --cache
            --max-cache-age 1d
            "docs/**/*.md"
            "README.md"
          # Don't fail the entire pipeline on link check failures
          fail: false
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report link check results
        if: always()
        run: |
          echo "📋 Link validation completed (non-blocking)"
          echo "ℹ️  Check job summary for detailed results"

  # Job 4: Simple YAML Validation (Quiet)
  yaml-validation:
    name: YAML Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10 # YAML validation is quick

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install yamllint
        run: python3 -m pip install yamllint

      - name: Validate workflow files only
        run: |
          echo "🔍 Validating critical YAML files..."
          if ! python3 -m yamllint -c config/.yamllint.yml .github/workflows/; then
            echo "❌ YAML validation failed"
            echo "ℹ️  Check yamllint output above for details"
            exit 1
          fi
          echo "✅ YAML validation completed"
