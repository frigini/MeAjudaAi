name: Frontend CI

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/Web/**'
      - 'src/Client/**'
      - 'src/Bootstrapper/**'
      - 'src/Modules/**'
      - 'src/Shared/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/actions/setup-frontend/**'
      - '.github/actions/setup-backend/**'
      - 'MeAjudaAi.slnx'
  pull_request:
    branches: [master, develop]
    paths:
      - 'src/Web/**'
      - 'src/Client/**'
      - 'src/Bootstrapper/**'
      - 'src/Modules/**'
      - 'src/Shared/**'
      - '.github/workflows/ci-frontend.yml'
      - '.github/actions/setup-frontend/**'
      - '.github/actions/setup-backend/**'
      - 'MeAjudaAi.slnx'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  build-and-test:
    name: Build and Test (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Backend (for API Generation)
        uses: ./.github/actions/setup-backend

      - name: Setup Frontend
        uses: ./.github/actions/setup-frontend

      - name: Build Backend (for API Generation)
        run: dotnet build MeAjudaAi.slnx --configuration Release --no-restore

      - name: Generate API Client
        working-directory: ./src/Web
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/src/api"
          export ASPNETCORE_ENVIRONMENT=Development
          export ConnectionStrings__DefaultConnection="Host=localhost;Database=dummy"
          export Migrations__Enabled=false
          SEARCH_DIR="$GITHUB_WORKSPACE/src/Bootstrapper/MeAjudaAi.ApiService/bin/Release"
          DLL_PATH=$(find "$SEARCH_DIR" -name "MeAjudaAi.ApiService.dll" | head -n 1)
          if [ -z "$DLL_PATH" ]; then
            echo "Error: MeAjudaAi.ApiService.dll not found!"
            exit 1
          fi
          swagger tofile --output "$GITHUB_WORKSPACE/src/api/api-spec.json" "$DLL_PATH" v1
          export OPENAPI_SPEC_URL="$GITHUB_WORKSPACE/src/api/api-spec.json"
          npm run generate:api --workspace=meajudaai.web.customer
          npm run generate:api --workspace=meajudaai.web.admin
          npm run generate:api --workspace=meajudaai.web.provider

      - name: Validate Generated API Clients
        working-directory: ./src/Web
        run: |
          npx nx build meajudaai.web.customer --configuration=development
          npx nx build meajudaai.web.admin --configuration=development
          npx nx build meajudaai.web.provider --configuration=development

      - name: Lint Frontend
        working-directory: ./src/Web
        run: npx nx affected --target=lint

      - name: Test Frontend
        working-directory: ./src/Web
        run: |
          npx nx run-many --target=test --all --args="--coverage"
          node scripts/merge-coverage.mjs

      - name: Build Frontend
        working-directory: ./src/Web
        env:
          KEYCLOAK_ADMIN_CLIENT_ID: ci-build-placeholder
          KEYCLOAK_ADMIN_CLIENT_SECRET: ci-build-placeholder
          KEYCLOAK_ISSUER: http://localhost:8080/realms/meajudaai
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-build-placeholder
          AUTH_SECRET: ci-build-placeholder
        run: |
          set -e
          npx nx run MeAjudaAi.Web.Customer:build
          npx nx run MeAjudaAi.Web.Admin:build
          npx nx run MeAjudaAi.Web.Provider:build

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        continue-on-error: true
        with:
          filename: "src/Web/coverage-global/cobertura-coverage.xml"
          badge: true
          format: markdown
          output: both

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: |
            src/Web/**/coverage/cobertura-coverage.xml
            src/Web/coverage-global/cobertura-coverage.xml
          retention-days: 30

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          recreate: true
          header: coverage-report-frontend
          path: "code-coverage-results.md"
