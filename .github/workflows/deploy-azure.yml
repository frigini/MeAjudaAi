name: Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'prod'
      deploy_infrastructure:
        description: 'Deploy infrastructure'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  deployments: write
  statuses: write

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_LOCATION: 'brazilsouth'
  ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/master' && 'prod' || 'dev') }}

jobs:
  # Infrastructure Validation (Read-only)
  validate-infrastructure:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      deployments: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Bicep syntax
        run: az bicep build --file infrastructure/main.bicep

  # Deploy to Azure
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [validate-infrastructure]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/master' && 'prod' || 'dev') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        if: github.event.inputs.deploy_infrastructure != 'false'
        run: |
          az group create \
            --name meajudaai-${{ env.ENVIRONMENT }}-rg \
            --location ${{ env.AZURE_LOCATION }}

      - name: Deploy Infrastructure
        if: github.event.inputs.deploy_infrastructure != 'false'
        run: |
          az deployment group create \
            --name meajudaai-${{ env.ENVIRONMENT }}-deployment \
            --resource-group meajudaai-${{ env.ENVIRONMENT }}-rg \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/${{ env.ENVIRONMENT }}.parameters.json \
            --parameters postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }}
