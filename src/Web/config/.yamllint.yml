extends: default

rules:
  # Increase line length limit for complex YAML files
  line-length:
    max: 120
    level: warning

  # Allow long lines in comments
  comments:
    level: warning

  # Allow no document end marker
  document-end: disable

  # Indentation rules
  indentation:
    spaces: 2
    indent-sequences: true

ignore: |
  **/node_modules/
  **/.git/
  **/vendor/
  **/*.min.yml
  **/*.min.yaml
