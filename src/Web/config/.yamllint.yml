extends: default

rules:
  # Relax rules to avoid noise in legacy/existing workflow files
  line-length: disable
  trailing-spaces: disable
  document-start: disable
  document-end: disable
  truthy: disable
  comments: disable
  comments-indentation: disable
  empty-lines: disable
  new-line-at-end-of-file: disable

ignore: |
  **/node_modules/
  **/.git/
  **/vendor/
  **/*.min.yml
  **/*.min.yaml
